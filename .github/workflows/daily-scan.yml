name: KDJ 每日扫描

on:
  schedule:
    # 北京时间 15:30 = UTC 07:30（周一至周五）
    - cron: "30 7 * * 1-5"
  workflow_dispatch:  # 允许手动触发

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行 KDJ 扫描
        run: python scanner.py

      - name: 上传结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kdj-results
          path: result_*.csv
          retention-days: 30
